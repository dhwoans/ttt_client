# test 코드가 제대로 작동되는지 확인용
name: Test

on:
  push:
    branches: [master, test/*, feat/*]
  # pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        
      - name: Run tests with Vitest
        run: pnpm vitest --run
